<!DOCTYPE html>
<html>
<head>
<style>

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f2f2f2;
}

.box{
  width:150px;
  height:150px;
  background:blue;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border-radius:10px;
  transition: transform 0.5s;
}

/* Transform effect */
.box:hover{
  transform: rotate(20deg) scale(1.2);
}

</style>
</head>

<body>

<div class="box">Hover Me</div>

</body>
</html>
