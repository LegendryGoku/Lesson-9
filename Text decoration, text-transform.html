<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  background-color: #f7f7f7;
}

/* Heading with text-transform and text-decoration */
h1 {
  text-transform: uppercase; /* Makes all letters uppercase */
  text-decoration: underline; /* Adds underline */
  color: #2c3e50;
}

/* Paragraph with different text decorations */
p {
  text-transform: capitalize; /* Capitalizes first letter of each word */
  text-decoration: overline; /* Adds a line above the text */
  color: #e74c3c;
  font-size: 18px;
  margin-top: 20px;
}

/* Link with multiple text decorations */
a {
  text-decoration: none; /* Removes underline */
  text-transform: lowercase; /* Makes all letters lowercase */
  color: #2980b9;
  font-weight: bold;
}

a:hover {
  text-decoration: underline overline; /* Adds both lines on hover */
}
</style>
</head>

<body>

<h1>Welcome to CSS Styling</h1>

<p>this is a paragraph styled with text-transform and text-decoration.</p>

<a href="#">Click Here</a>

</body>
</html>
